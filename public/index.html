<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiZ Home Controller</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .light-card {
      transition: all 0.3s ease;
    }
    .light-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }
    .light-on {
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      border-color: #fbbf24;
    }
    .light-off {
      background: #f3f4f6;
      border-color: #d1d5db;
    }
    .slider {
      -webkit-appearance: none;
      appearance: none;
      height: 8px;
      border-radius: 5px;
      background: #d1d5db;
      outline: none;
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #3b82f6;
      cursor: pointer;
    }
    .slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #3b82f6;
      cursor: pointer;
    }
    
    /* Signal bar levels using stacked bars */
    .signal-bars {
      display: inline-flex;
      align-items: flex-end;
      gap: 1px;
      height: 16px;
    }
    .signal-bar {
      width: 3px;
      background-color: currentColor;
      border-radius: 1px;
    }
    .signal-bar-1 { height: 25%; }
    .signal-bar-2 { height: 50%; }
    .signal-bar-3 { height: 75%; }
    .signal-bar-4 { height: 100%; }
    .signal-bar.inactive {
      opacity: 0.2;
    }
    
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body class="bg-gray-50">
  <!-- Header -->
  <header class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center space-x-3">
          <i class="fas fa-lightbulb text-3xl text-yellow-500"></i>
          <h1 class="text-2xl font-bold text-gray-900">WiZ Home Controller</h1>
        </div>
        <div class="flex items-center space-x-4">
          <div id="connectionStatus" class="flex items-center space-x-2">
            <div class="w-3 h-3 rounded-full bg-gray-400"></div>
            <span class="text-sm text-gray-600">Connecting...</span>
          </div>
          <a href="/devices.html" class="px-4 py-2 bg-purple-500 text-white rounded-lg hover:bg-purple-600 transition">
            <i class="fas fa-cogs mr-2"></i>Devices
          </a>
          <button onclick="syncAllLights()" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition">
            <i class="fas fa-sync-alt mr-2"></i>Refresh
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Groups Section -->
    <section class="mb-8">
      <h2 class="text-xl font-semibold text-gray-900 mb-4">Groups</h2>
      <div id="groupsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <!-- Groups will be loaded here -->
      </div>
    </section>

    <!-- Lights Section -->
    <section>
      <h2 class="text-xl font-semibold text-gray-900 mb-4">Lights</h2>
      <div id="lightsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <!-- Lights will be loaded here -->
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
